services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dolgoletie:latest
    container_name: dolgoletie
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/data.db
      UPLOADS_DIR: /app/uploads
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      # Монтируем .env: npm run set-password пишет в него хеш пароля,
      # без этого изменения остались бы внутри контейнера и не попадали в host.
      - ./.env:/app/.env
    restart: unless-stopped
