services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dolgoletie:latest
    container_name: dolgoletie
    ports:
      - "3000:3000"
    # env_file НЕ используем: docker-compose парсит .env сам и воспринимает
    # \$ в bcrypt-хеше как подстановку переменных. Вместо этого монтируем .env
    # как файл-volume и загружаем его в start.js через @next/env.
    environment:
      DATABASE_URL: file:/app/data/data.db
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    restart: unless-stopped
